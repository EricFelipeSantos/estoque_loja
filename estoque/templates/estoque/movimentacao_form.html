{% extends 'core/base.html' %}

{% block content %}

<div class="container mt-5" style="max-width: 500px;">

  <div class="card shadow">
    <div class="card-body">

      <h3 class="mb-4 text-center">Nova Movimentação 🔄</h3>

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label>Produto</label>
          {{ form.produto }}
        </div>

        <div class="mb-3">
          <label>Tipo</label>
          {{ form.tipo }}
        </div>

        <div class="mb-3">
          <label>Quantidade</label>
          {{ form.quantidade }}
        </div>

        <button class="btn btn-success w-100">Salvar</button>

        <a href="{% url 'estoque:lista_movimentacoes' %}" class="btn btn-secondary w-100 mt-2">
          Cancelar
        </a>

      </form>

    </div>
  </div>

</div>

{% endblock %}
