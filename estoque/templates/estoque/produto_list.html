{% extends 'core/base.html' %}

{% block content %}

<div class="container mt-5">

  <div class="d-flex justify-content-between mb-3">
    <h2>Produtos 📦</h2>

    <a href="{% url 'estoque:produto_create' %}" class="btn btn-primary">
      Novo Produto
    </a>
  </div>

  <table class="table table-striped table-hover">
    <thead class="table-dark">
      <tr>
        <th>Nome</th>
        <th>Preço</th>
        <th>Categoria</th>
        <th>Quantidade</th>
        <th>Ações</th>
      </tr>
    </thead>

    <tbody>
      {% for produto in produtos %}
      <tr>
        <td>{{ produto.nome }}</td>
        <td>R$ {{ produto.preco }}</td>
        <td>{{ produto.categoria }}</td>
        <td>{{ produto.quantidade }}</td>
        <td>
          <a href="{% url 'estoque:produto_update' produto.id %}" class="btn btn-sm btn-warning">
            Editar
          </a>

          <a href="{% url 'estoque:produto_delete' produto.id %}" class="btn btn-sm btn-danger">
            Excluir
          </a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

</div>

{% endblock %}
