{% extends 'core/base.html' %}

{% block content %}

<div class="container mt-5">

  <div class="d-flex justify-content-between mb-3">
    <h2>Categorias 🗂️</h2>

    <a href="{% url 'estoque:categoria_create' %}" class="btn btn-primary">
      Nova Categoria
    </a>
  </div>

  <table class="table table-striped table-hover">
    <thead class="table-dark">
      <tr>
        <th>Nome</th>
        <th>Ações</th>
      </tr>
    </thead>

    <tbody>
      {% for categoria in categorias %}
      <tr>
        <td>{{ categoria.nome }}</td>
        <td>
          <a href="{% url 'estoque:categoria_update' categoria.id %}" class="btn btn-sm btn-warning">
            Editar
          </a>

          <a href="{% url 'estoque:categoria_delete' categoria.id %}" class="btn btn-sm btn-danger">
            Excluir
          </a>
        </td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="2" class="text-center">Nenhuma categoria cadastrada</td>
      </tr>
      {% endfor %}
    </tbody>

  </table>

</div>

{% endblock %}
