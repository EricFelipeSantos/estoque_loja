{% extends 'core/base.html' %}

{% block content %}

<div class="container mt-5" style="max-width: 500px;">

  <div class="card shadow">
    <div class="card-body">

      <h3 class="mb-4 text-center">
        {% if form.instance.pk %}
          Editar Categoria
        {% else %}
          Nova Categoria
        {% endif %}
      </h3>

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Nome</label>
          {{ form.nome }}
        </div>

        <button type="submit" class="btn btn-success w-100">
          Salvar
        </button>

        <a href="{% url 'estoque:lista_categorias' %}" class="btn btn-secondary w-100 mt-2">
          Cancelar
        </a>

      </form>

    </div>
  </div>

</div>

{% endblock %}
