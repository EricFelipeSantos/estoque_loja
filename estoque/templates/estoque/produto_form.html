{% extends 'core/base.html' %}

{% block content %}

<div class="container mt-5" style="max-width: 600px;">

  <div class="card shadow">
    <div class="card-body">

      <h3 class="mb-4">
        {% if form.instance.pk %}
          Editar Produto
        {% else %}
          Novo Produto
        {% endif %}
      </h3>

      <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-success">
          Salvar
        </button>

        <a href="{% url 'estoque:lista_produtos' %}" class="btn btn-secondary">
          Cancelar
        </a>

      </form>

    </div>
  </div>

</div>

{% endblock %}
