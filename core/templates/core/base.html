<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Estoque</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="{% url 'core:home' %}">Home</a>
    <a class="navbar-brand" href="{% url 'estoque:lista_produtos' %}">Produtos</a>
    <a class="navbar-brand" href="{% url 'estoque:lista_categorias' %}">Categorias</a>
    <a class="navbar-brand" href="{% url 'estoque:lista_movimentacoes' %}">Movimentações</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <form method="post" action="{% url 'core:logout' %}">
            {% csrf_token %}
            <button type="submit" class="nav-link btn btn-link" style="display:inline; border:none;">
              Sair
            </button>
          </form>
        </li>

      </ul>
    </div>
  </div>
</nav>

{% block content %}
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

{% if messages %}
  <div class="container mt-3">
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  </div>
{% endif %}

</body>
</html>
